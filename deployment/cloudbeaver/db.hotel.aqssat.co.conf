# =============================================================================
# CloudBeaver vhost (HTTP)
# Used ONLY by certbot to issue/renew the SSL certificate.
# After certbot runs successfully, all traffic is forced to HTTPS.
# =============================================================================
<VirtualHost *:80>
    ServerName db.hotel.aqssat.co

    # Allow ACME challenge for Let's Encrypt renewals
    Alias /.well-known/acme-challenge/ /var/www/html/.well-known/acme-challenge/
    <Directory "/var/www/html/.well-known/acme-challenge/">
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    # Redirect everything else to HTTPS
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^/?(.*)$ https://db.hotel.aqssat.co/$1 [R=301,L]

    ErrorLog  ${APACHE_LOG_DIR}/db.hotel.aqssat.co-error.log
    CustomLog ${APACHE_LOG_DIR}/db.hotel.aqssat.co-access.log combined
</VirtualHost>

# =============================================================================
# CloudBeaver vhost (HTTPS)
# Reverse-proxy to local CloudBeaver on 127.0.0.1:8978 with WebSocket support.
# Hardened with: IP whitelist + HTTP Basic Auth + strict security headers.
# =============================================================================
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName db.hotel.aqssat.co

    ProxyPreserveHost On
    ProxyRequests Off

    # ---- WebSocket upgrade (CloudBeaver uses WS for live updates) -----------
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*)  ws://127.0.0.1:8978/$1  [P,L]

    # ---- HTTP reverse proxy --------------------------------------------------
    ProxyPass        / http://127.0.0.1:8978/
    ProxyPassReverse / http://127.0.0.1:8978/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port  "443"

    # ---- Access control (REQUIRED for production!) --------------------------
    # Replace YOUR.OFFICE.IP / YOUR.HOME.IP with your real public IPs.
    # Run `curl ifconfig.me` from each location to get them.
    <Location "/">
        # Layer 1 - IP whitelist
        <RequireAny>
            Require ip 127.0.0.1
            # Require ip YOUR.OFFICE.IP.ADDR
            # Require ip YOUR.HOME.IP.ADDR
        </RequireAny>

        # Layer 2 - HTTP Basic Auth (created via htpasswd, see README)
        AuthType Basic
        AuthName "Restricted - DB Admin"
        AuthUserFile /etc/apache2/.htpasswd-cloudbeaver
        Require valid-user

        # Both layers must pass
        Satisfy All
    </Location>

    # ---- Security headers ----------------------------------------------------
    <IfModule mod_headers.c>
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
        Header always set X-Frame-Options "SAMEORIGIN"
        Header always set X-Content-Type-Options "nosniff"
        Header always set Referrer-Policy "no-referrer"
        Header always set Cache-Control "no-store"
    </IfModule>

    ErrorLog  ${APACHE_LOG_DIR}/db.hotel.aqssat.co-error.log
    CustomLog ${APACHE_LOG_DIR}/db.hotel.aqssat.co-access.log combined

    SSLCertificateFile    /etc/letsencrypt/live/db.hotel.aqssat.co/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/db.hotel.aqssat.co/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
