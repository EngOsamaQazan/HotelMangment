<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName hotel.aqssat.co

    ProxyPreserveHost On

    ProxyPass /hooks/ http://127.0.0.1:9000/hooks/
    ProxyPassReverse /hooks/ http://127.0.0.1:9000/hooks/

    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    RequestHeader set X-Forwarded-Proto "https"

    # =========================================================================
    # Cache policy (authoritative ? overrides backend Next.js & global conf)
    # Using "Header unset" (onsuccess) to strip backend proxy headers, then
    # "Header set" to add our own. "always" variants cover error responses.
    # =========================================================================

    # Long cache for fingerprinted Next.js static assets.
    <LocationMatch "^/_next/static/">
        <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresDefault "access plus 1 year"
        </IfModule>
        <IfModule mod_headers.c>
            Header unset Expires
            Header unset Pragma
            Header unset Cache-Control
            Header unset Surrogate-Control
            Header unset CDN-Cache-Control
            Header always unset Cache-Control
            Header set Cache-Control "public, max-age=31536000, immutable"
        </IfModule>
    </LocationMatch>

    # Next.js optimized images: 1 day cache.
    <LocationMatch "^/_next/image">
        <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresDefault "access plus 1 day"
        </IfModule>
        <IfModule mod_headers.c>
            Header unset Expires
            Header unset Pragma
            Header unset Cache-Control
            Header unset Surrogate-Control
            Header unset CDN-Cache-Control
            Header always unset Cache-Control
            Header set Cache-Control "public, max-age=86400"
        </IfModule>
    </LocationMatch>

    # API responses and Next.js data payloads must never be cached anywhere.
    <LocationMatch "^/(api|_next/data)(/|$)">
        <IfModule mod_expires.c>
            ExpiresActive Off
        </IfModule>
        <IfModule mod_headers.c>
            Header unset Expires
            Header unset Pragma
            Header unset Cache-Control
            Header unset Surrogate-Control
            Header unset CDN-Cache-Control
            Header always unset Cache-Control
            Header set Cache-Control "no-store, no-cache, must-revalidate, max-age=0"
            Header set Pragma "no-cache"
            Header set Expires "0"
            Header set Surrogate-Control "no-store"
            Header set CDN-Cache-Control "no-store"
        </IfModule>
    </LocationMatch>

    # HTML pages: private revalidation (bfcache-friendly ? instant back/forward).
    <LocationMatch "^/(?!_next/|api/)">
        <IfModule mod_expires.c>
            ExpiresActive Off
        </IfModule>
        <IfModule mod_headers.c>
            Header unset Expires
            Header unset Pragma
            Header unset Cache-Control
            Header unset Surrogate-Control
            Header unset CDN-Cache-Control
            Header always unset Cache-Control
            Header set Cache-Control "private, no-cache, must-revalidate, max-age=0"
        </IfModule>
    </LocationMatch>

    ErrorLog ${APACHE_LOG_DIR}/hotel.aqssat.co-error.log
    CustomLog ${APACHE_LOG_DIR}/hotel.aqssat.co-access.log combined

SSLCertificateFile /etc/letsencrypt/live/hotel.aqssat.co/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/hotel.aqssat.co/privkey.pem
Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
