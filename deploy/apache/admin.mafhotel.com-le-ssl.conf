<VirtualHost *:443>
    ServerName admin.mafhotel.com

    # Reverse proxy (shares the same Next.js process as mafhotel.com on :3000;
    # the app routes by Host header via src/middleware.ts).
    ProxyPreserveHost On
    ProxyRequests Off
    ProxyTimeout 60

    # Tell the upstream Next.js that the public-facing scheme is HTTPS, so
    # cross-host redirects built in middleware end up as https:// (no extra
    # 301 hop through the HTTP vhost).
    RequestHeader set X-Forwarded-Proto "https"

    # ── Socket.IO / WebSocket → realtime service on :3001 ──────
    # Staff dashboard uses the same realtime channel, served via the public
    # Socket.IO on 3001.
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/socket\.io/(.*) ws://127.0.0.1:3001/socket.io/$1 [P,L]
    ProxyPass        /socket.io/ http://127.0.0.1:3001/socket.io/
    ProxyPassReverse /socket.io/ http://127.0.0.1:3001/socket.io/

    # Main app (Next.js on :3000)
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # SSL — certificate must cover `admin.mafhotel.com` (issue a dedicated cert
    # via certbot, or extend the existing mafhotel.com cert with -d admin.mafhotel.com).
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/mafhotel.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/mafhotel.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    # Security headers — the admin UI is never embedded elsewhere.
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"

    # Large uploads / long timeouts (matches mafhotel.com config for parity).
    LimitRequestBody 52428800

    ErrorLog ${APACHE_LOG_DIR}/admin.mafhotel.com-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/admin.mafhotel.com-ssl-access.log combined
</VirtualHost>
