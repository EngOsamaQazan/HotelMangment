<VirtualHost *:80>
    ServerName admin.mafhotel.com

    # Keep ACME challenge available for renewals
    Alias /.well-known/acme-challenge/ /var/www/html/.well-known/acme-challenge/
    <Directory "/var/www/html/.well-known/acme-challenge/">
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    # Everything else → HTTPS
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^/?(.*) https://admin.mafhotel.com/$1 [R=301,L]

    ErrorLog ${APACHE_LOG_DIR}/admin.mafhotel.com-error.log
    CustomLog ${APACHE_LOG_DIR}/admin.mafhotel.com-access.log combined
</VirtualHost>
