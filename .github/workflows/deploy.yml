name: Deploy to mafhotel.com

# Tayseer-style fast deploy:
#   1. SSH into the server
#   2. git pull the latest code in-place
#   3. Skip npm ci / prisma generate when hashes are unchanged
#   4. Always run `next build` but with `.next/cache/` preserved for
#      Turbopack's incremental cache -> small change builds in ~20-30s
#   5. Restart systemd services
#
# Previous flow: build on the runner + rsync everything -> ~3-5 min.
# This flow:     pull + (maybe) npm ci + build + restart -> ~30-60 s
# for code-only changes, matching our PHP sibling.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          command_timeout: 12m
          script: |
            set -euo pipefail
            export NVM_DIR="$HOME/.nvm"
            # shellcheck source=/dev/null
            source "$NVM_DIR/nvm.sh"

            DEPLOY_PATH="/opt/mafhotel.com"
            APP_DIR="$DEPLOY_PATH/app"
            SHARED="$DEPLOY_PATH/shared"
            STATE="$SHARED/deploy-state"
            REPO_URL="https://github.com/EngOsamaQazan/HotelMangment.git"
            BRANCH="main"

            mkdir -p "$STATE"

            # ───── 1. Clone on first deploy, pull afterwards ─────────
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "==> [1/6] First deploy — cloning repo into $APP_DIR"
              rm -rf "$APP_DIR"
              git clone --depth 20 --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            else
              echo "==> [1/6] Pulling latest changes"
              cd "$APP_DIR"
              git fetch origin "$BRANCH" --depth 20
              git reset --hard "origin/$BRANCH"
              git clean -fd -e node_modules -e .next -e uploads -e .env -e google-vision-key.json
            fi

            cd "$APP_DIR"
            SHA=$(git rev-parse --short HEAD)
            echo "    deployed commit: $SHA"

            # ───── 2. Link shared files (idempotent) ─────────────────
            echo "==> [2/6] Linking shared env + uploads + vision key"
            ln -sfn "$SHARED/.env"     ".env"
            ln -sfn "$SHARED/uploads"  "uploads"
            if [ -f "$SHARED/google-vision-key.json" ]; then
              ln -sfn "$SHARED/google-vision-key.json" "google-vision-key.json"
            fi

            # ───── 3. Smart npm ci (skip when lock unchanged) ────────
            NEW_LOCK=$(sha256sum package-lock.json | cut -d' ' -f1)
            OLD_LOCK=$(cat "$STATE/lock-hash" 2>/dev/null || echo "")
            if [ "$NEW_LOCK" != "$OLD_LOCK" ] || [ ! -d node_modules ]; then
              echo "==> [3/6] package-lock.json changed -> npm ci"
              npm ci --no-audit --no-fund --prefer-offline
              echo "$NEW_LOCK" > "$STATE/lock-hash"
            else
              echo "==> [3/6] npm deps unchanged -> skipping npm ci"
            fi

            if [ -d realtime ]; then
              NEW_RT=$(sha256sum realtime/package-lock.json 2>/dev/null | cut -d' ' -f1 || echo "")
              OLD_RT=$(cat "$STATE/realtime-lock-hash" 2>/dev/null || echo "")
              if [ -n "$NEW_RT" ] && { [ "$NEW_RT" != "$OLD_RT" ] || [ ! -d realtime/node_modules ]; }; then
                echo "    realtime deps changed -> npm install"
                (cd realtime && npm install --omit=dev --no-audit --no-fund)
                echo "$NEW_RT" > "$STATE/realtime-lock-hash"
              fi
            fi

            # ───── 4. Smart Prisma (generate + db push only on change) ─
            NEW_SCHEMA=$(sha256sum prisma/schema.prisma | cut -d' ' -f1)
            OLD_SCHEMA=$(cat "$STATE/schema-hash" 2>/dev/null || echo "")
            if [ "$NEW_SCHEMA" != "$OLD_SCHEMA" ] || [ ! -d node_modules/.prisma/client ]; then
              echo "==> [4/6] prisma schema changed -> generate + db push"
              set -a; source "$SHARED/.env"; set +a
              npx prisma generate
              npx prisma db push --skip-generate --accept-data-loss
              echo "$NEW_SCHEMA" > "$STATE/schema-hash"
            else
              echo "==> [4/6] prisma schema unchanged -> skipping generate"
            fi

            # ───── 5. Build Next.js (incremental via .next/cache) ────
            echo "==> [5/6] next build (incremental if .next/cache exists)"
            NEXTAUTH_SECRET=build-time-placeholder \
            NEXTAUTH_URL=https://mafhotel.com \
            NEXT_PUBLIC_SITE_URL=https://mafhotel.com \
            SKIP_ENV_VALIDATION=1 \
              npm run build

            # Next 16 + Turbopack standalone: copy static assets + wire
            # up hashed Prisma client aliases so the server.js resolves.
            if [ -d .next/standalone ]; then
              [ -d public ]        && cp -rn public        .next/standalone/          || true
              [ -d .next/static ]  && cp -rn .next/static  .next/standalone/.next/    || true
              if [ -f "$SHARED/google-vision-key.json" ]; then
                ln -sfn "$SHARED/google-vision-key.json" .next/standalone/google-vision-key.json
              fi
              mkdir -p .next/standalone/node_modules/@prisma .next/standalone/node_modules/.prisma
              [ -d node_modules/@prisma/client ] && cp -a node_modules/@prisma/client .next/standalone/node_modules/@prisma/ || true
              [ -d node_modules/.prisma/client ] && cp -a node_modules/.prisma/client .next/standalone/node_modules/.prisma/ || true

              HASHES=$(grep -hoE '@prisma/client-[a-f0-9]+' .next/standalone/.next/server/chunks/*.js 2>/dev/null | sort -u || true)
              for H in $HASHES; do
                NAME="${H#@prisma/}"
                [ ! -e ".next/standalone/node_modules/@prisma/$NAME" ] && \
                  ln -s client ".next/standalone/node_modules/@prisma/$NAME" || true
                [ ! -e "node_modules/@prisma/$NAME" ] && \
                  ln -s client "node_modules/@prisma/$NAME" || true
              done
            fi

            # ───── 6. Swap `current` symlink + restart services ──────
            ln -sfn "$APP_DIR" "$DEPLOY_PATH/current.new"
            mv -Tf "$DEPLOY_PATH/current.new" "$DEPLOY_PATH/current"

            echo "==> [6/6] Restarting services"
            sudo /bin/systemctl restart mafhotel-app.service
            sudo /bin/systemctl restart mafhotel-realtime.service

            # ───── Health check ──────────────────────────────────────
            echo "==> Health check"
            sleep 3
            for i in 1 2 3 4 5 6 7 8; do
              CODE=$(curl -sko /dev/null -w "%{http_code}" -m 6 https://mafhotel.com/login || echo 000)
              echo "    attempt $i: HTTP $CODE"
              if [ "$CODE" = "200" ]; then
                echo "✅ deployed $SHA"
                exit 0
              fi
              sleep 2
            done
            echo "❌ health check failed after 22s"
            exit 1
