name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            set -x
            cd /opt/hotel-app
            echo "===== STEP: pre-flight ====="
            df -h /opt
            free -h
            node -v
            npm -v
            pm2 list || true
            echo "===== STEP: git pull ====="
            git fetch origin main
            git reset --hard origin/main
            echo "===== STEP: npm ci ====="
            npm ci || { echo "FAIL: npm ci"; exit 11; }
            echo "===== STEP: prisma db push ====="
            npx prisma db push --accept-data-loss || { echo "FAIL: prisma db push"; exit 12; }
            echo "===== STEP: seed permissions ====="
            npm run db:seed-permissions || { echo "FAIL: seed-permissions"; exit 13; }
            echo "===== STEP: realtime triggers ====="
            if [ -f prisma/sql/realtime-triggers.sql ]; then
              PG_URL=$(grep -E '^DATABASE_URL=' .env | sed 's/^DATABASE_URL=//' | tr -d '"' | sed 's/?schema=[^&]*//' | sed 's/?$//')
              psql "$PG_URL" -v ON_ERROR_STOP=1 -f prisma/sql/realtime-triggers.sql || { echo "FAIL: realtime triggers"; exit 14; }
            fi
            echo "===== STEP: next build ====="
            npm run build || { echo "FAIL: next build"; exit 15; }
            echo "===== STEP: verify build artefacts ====="
            ls -la .next/standalone/ 2>&1 | head -20 || echo "(no standalone)"
            ls -la .next/static/ 2>&1 | head -5 || echo "(no .next/static)"
            if [ ! -f .next/standalone/server.js ]; then
              echo "FAIL: .next/standalone/server.js missing - check next.config output mode"
              exit 16
            fi
            if [ ! -d .next/static ]; then
              echo "FAIL: .next/static missing"
              exit 17
            fi
            echo "===== STEP: copy static + public into standalone ====="
            rm -rf .next/standalone/public .next/standalone/.next/static
            cp -r public .next/standalone/public || { echo "FAIL: cp public"; exit 18; }
            cp -r .next/static .next/standalone/.next/static || { echo "FAIL: cp .next/static"; exit 19; }
            cp .env .next/standalone/.env || { echo "FAIL: cp .env"; exit 20; }
            cp google-vision-key.json .next/standalone/google-vision-key.json 2>/dev/null || true
            echo "===== STEP: post-copy verification ====="
            ls .next/standalone/.next/static | head -5
            ls .next/standalone/public | head -5
            mkdir -p /opt/hotel-app/uploads
            chmod 750 /opt/hotel-app/uploads
            echo "===== STEP: pm2 restart hotel-app ====="
            cd /opt/hotel-app
            pm2 delete hotel-app 2>/dev/null || true
            PORT=3000 HOSTNAME=0.0.0.0 pm2 start .next/standalone/server.js --name hotel-app --cwd /opt/hotel-app || { echo "FAIL: pm2 start"; pm2 logs hotel-app --lines 50 --nostream || true; exit 21; }
            sleep 3
            pm2 list
            echo "===== STEP: smoke test localhost ====="
            curl -sI http://127.0.0.1:3000/logo.png | head -5 || true
            curl -sI http://127.0.0.1:3000/ | head -5 || true
            echo "===== STEP: realtime microservice ====="
            cd /opt/hotel-app/realtime
            npm ci --omit=dev || npm install --omit=dev || true
            cd /opt/hotel-app
            pm2 restart hotel-realtime || pm2 start realtime/ecosystem.config.cjs || true
            pm2 save
            apache2ctl configtest && systemctl reload apache2 || true
            echo "===== Deployment completed at $(date) ====="
