services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: fakher_hotel
      POSTGRES_USER: fakher_user
      POSTGRES_PASSWORD: FakherHotel2026Secure
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fakher_user -d fakher_hotel"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://fakher_user:FakherHotel2026Secure@db:5432/fakher_hotel?schema=public
      NEXTAUTH_SECRET: 1WrBBQYDLECVJDxMCWR-HF87SrJpKIYFZhLA9LBs2cGsW2NXid8pva7HYupJlV82
      NEXTAUTH_URL: https://hotel.aqssat.co
      GOOGLE_APPLICATION_CREDENTIALS: ./google-vision-key.json
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
